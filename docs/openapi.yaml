  # ── Usuarios ───────────────────────────────────────────────────

  /usuarios:
    get:
      tags: [Usuarios]
      summary: Listar usuarios
      description: "🔐 Solo **Administrador**"
      parameters:
        - name: search
          in: query
          description: Filtrar por username o email
          schema:
            type: string
            example: miller
        - name: rol_id
          in: query
          description: Filtrar por rol
          schema:
            type: integer
            example: 1
        - name: activo
          in: query
          description: Filtrar por estado activo/inactivo
          schema:
            type: boolean
            example: true
        - name: con_eliminados
          in: query
          description: Incluir usuarios con soft delete
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: Listado obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Usuario'

    post:
      tags: [Usuarios]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUsuarioRequest'
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Usuario'
        '422':
          $ref: '#/components/responses/ValidationError'

  /usuarios/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Usuarios]
      summary: Obtener usuario por ID
      responses:
        '200':
          description: Usuario obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Usuario'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Usuarios]
      summary: Actualizar usuario (completo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Usuario'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      tags: [Usuarios]
      summary: Actualizar usuario (parcial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsuarioRequest'
      responses:
        '200':
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Usuario'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Usuarios]
      summary: Eliminar usuario (soft delete)
      description: Establece `deleted_at`. El registro permanece en la BD para preservar historial de ventas.
      responses:
        '204':
          description: Usuario eliminado correctamente
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Ventas ─────────────────────────────────────────────────────

  /ventas:
    get:
      tags: [Ventas]
      summary: Listar ventas
      description: "🔐 Admin + Vendedor"
      parameters:
        - name: search
          in: query
          description: Filtrar por cliente o número de comprobante
          schema:
            type: string
            example: Juan
        - name: usuario_id
          in: query
          description: Filtrar por usuario
          schema:
            type: integer
            example: 1
        - name: almacen_id
          in: query
          description: Filtrar por almacén
          schema:
            type: integer
            example: 1
        - name: estado
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [pendiente, completada, cancelada]
            example: completada
        - name: tipo_pago
          in: query
          description: Filtrar por tipo de pago
          schema:
            type: string
            enum: [efectivo, tarjeta, transferencia, otro]
            example: efectivo
        - name: fecha_desde
          in: query
          description: Filtrar ventas desde esta fecha (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2026-03-01'
        - name: fecha_hasta
          in: query
          description: Filtrar ventas hasta esta fecha (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2026-03-31'
        - name: con_eliminados
          in: query
          description: Incluir ventas con soft delete
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: Listado obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Venta'

    post:
      tags: [Ventas]
      summary: Crear venta
      description: "🔐 Admin + Vendedor"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreVentaRequest'
      responses:
        '201':
          description: Venta creada correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Venta'
        '422':
          $ref: '#/components/responses/ValidationError'

  /ventas/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Ventas]
      summary: Obtener venta por ID
      responses:
        '200':
          description: Venta obtenida correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Venta'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Ventas]
      summary: Actualizar venta (completo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVentaRequest'
      responses:
        '200':
          description: Venta actualizada correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Venta'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      tags: [Ventas]
      summary: Actualizar venta (parcial)
      description: |
        🔐 **Admin + Vendedor** (con restricción de rol):
        - **Vendedor**: solo puede enviar `{ "estado": "completada" }`
        - **Administrador**: puede modificar cualquier campo, incluyendo cancelar (`estado: cancelada`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVentaRequest'
      responses:
        '200':
          description: Venta actualizada correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Venta'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Ventas]
      summary: Eliminar venta (soft delete)
      description: "🔐 Solo **Administrador**. Establece `deleted_at`. El registro permanece en la BD para preservar el historial de detalle_ventas."
      responses:
        '204':
          description: Venta eliminada correctamente
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Movimientos ───────────────────────────────────────────────

  /movimientos:
    get:
      tags: [Movimientos]
      summary: Listar movimientos
      parameters:
        - name: producto_id
          in: query
          description: Filtrar por producto
          schema:
            type: integer
            example: 1
        - name: almacen_id
          in: query
          description: Filtrar por almacén
          schema:
            type: integer
            example: 1
        - name: usuario_id
          in: query
          description: Filtrar por usuario que registró el movimiento
          schema:
            type: integer
            example: 1
        - name: tipo
          in: query
          description: Filtrar por tipo de movimiento
          schema:
            type: string
            enum: [entrada, salida]
            example: entrada
        - name: fecha_desde
          in: query
          description: Filtrar desde esta fecha (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2026-03-01'
        - name: fecha_hasta
          in: query
          description: Filtrar hasta esta fecha (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2026-03-31'
      responses:
        '200':
          description: Listado obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Movimiento'

    post:
      tags: [Movimientos]
      summary: Registrar movimiento
      description: |
        Registra una entrada o salida de stock.
        - **entrada**: aumenta la cantidad en inventario
        - **salida**: disminuye la cantidad en inventario (error 422 si stock insuficiente)

        La actualización de inventario y el registro del movimiento ocurren en una sola transacción atómica.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreMovimientoRequest'
      responses:
        '201':
          description: Movimiento registrado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Movimiento'
        '422':
          $ref: '#/components/responses/ValidationError'

  /movimientos/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Movimientos]
      summary: Obtener movimiento por ID
      responses:
        '200':
          description: Movimiento obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Movimiento'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Detalle Ventas ────────────────────────────────────────────

  /ventas/{venta_id}/detalles:
    parameters:
      - name: venta_id
        in: path
        required: true
        description: ID de la venta
        schema:
          type: integer
          example: 1

    get:
      tags: [Detalle Ventas]
      summary: Listar detalles de una venta
      description: "🔐 Admin + Vendedor — Devuelve todas las líneas de producto asociadas a la venta indicada."
      responses:
        '200':
          description: Listado obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DetalleVenta'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Detalle Ventas]
      summary: Agregar detalle a una venta
      description: |
        🔐 **Admin + Vendedor** — Registra una línea de producto en la venta.
        La operación ocurre en una **transacción atómica**:

        1. Verifica que la venta esté en estado `pendiente`
        2. Verifica que exista inventario del producto en el almacén de la venta
        3. Verifica stock suficiente
        4. Crea el movimiento de salida (descuenta inventario)
        5. Crea el detalle con el `movimiento_id` generado
        6. Recalcula `venta.total` sumando todos los `sub_total`

        El cliente **no** envía `almacen_id`, `sub_total` ni `movimiento_id` — se calculan automáticamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreDetalleVentaRequest'
      responses:
        '201':
          description: Detalle registrado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DetalleVenta'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Stock insuficiente, venta no pendiente o inventario inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: "Stock insuficiente. Disponible: 5."

  /ventas/{venta_id}/detalles/{id}:
    parameters:
      - name: venta_id
        in: path
        required: true
        description: ID de la venta
        schema:
          type: integer
          example: 1
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Detalle Ventas]
      summary: Obtener detalle por ID
      description: Devuelve el detalle indicado verificando que pertenezca a la venta de la URL.
      responses:
        '200':
          description: Detalle obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DetalleVenta'
        '404':
          $ref: '#/components/responses/NotFound'

# ══ COMPONENTS ══════════════════════════════════════════════════

components:

  # ── Seguridad ─────────────────────────────────────────────────

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Ingresa el token obtenido en `POST /auth/login`.
        Formato: `Bearer {access_token}`

  # ── Parámetros reutilizables ──────────────────────────────────

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        example: 1

  # ── Respuestas reutilizables ──────────────────────────────────

  responses:
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            message: Recurso no encontrado.

    Unauthorized:
      description: No autenticado — token ausente, inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            message: Token no válido o expirado.

    Forbidden:
      description: Sin permisos para esta acción (rol insuficiente)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            message: No tienes permisos para realizar esta acción.

    ValidationError:
      description: Error de validación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            message: El nombre de la categoría es obligatorio.
            errors:
              nombre: [El nombre de la categoría es obligatorio.]

  # ── Schemas ───────────────────────────────────────────────────

  schemas:

    # Respuesta estándar exitosa
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operación realizada correctamente.
        data:
          description: Payload de la respuesta

    # Respuesta estándar de error
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Recurso no encontrado.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    # ── Auth ──────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: carlos@licoreria.com
        password:
          type: string
          format: password
          minLength: 6
          example: vendedor123

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT Bearer token — válido 60 minutos
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Segundos hasta que el access token expire
          example: 3600
        usuario:
          $ref: '#/components/schemas/Usuario'

    # ── Categoría ─────────────────────────────────────────────

    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Lácteos
        descripcion:
          type: string
          nullable: true
          example: Productos derivados de la leche
        creado_en:
          type: string
          format: date-time
          example: '2026-03-06 10:00:00'
        actualizado_en:
          type: string
          format: date-time
          example: '2026-03-06 10:00:00'

    StoreCategoriaRequest:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          maxLength: 255
          example: Lácteos
        descripcion:
          type: string
          nullable: true
          example: Productos derivados de la leche

    UpdateCategoriaRequest:
      type: object
      properties:
        nombre:
          type: string
          maxLength: 255
          example: Lácteos
        descripcion:
          type: string
          nullable: true
          example: Productos derivados de la leche

    # ── Producto ──────────────────────────────────────────────

    Producto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        cod_producto:
          type: string
          example: PROD-001
        nombre:
          type: string
          example: Leche entera
        marca:
          type: string
          nullable: true
          example: Gloria
        unidad_medida:
          type: string
          example: lt
        contenido:
          type: string
          nullable: true
          example: 1lt
        precio_compra:
          type: number
          format: float
          example: 2.50
        precio_minorista:
          type: number
          format: float
          example: 3.50
        precio_mayorista:
          type: number
          format: float
          example: 3.00
        stock_minimo:
          type: integer
          example: 10
        activo:
          type: boolean
          example: true
        eliminado_en:
          type: string
          format: date-time
          nullable: true
          example: null
        categoria:
          $ref: '#/components/schemas/Categoria'
        creado_en:
          type: string
          format: date-time
          example: '2026-03-06 10:00:00'
        actualizado_en:
          type: string
          format: date-time
          example: '2026-03-06 10:00:00'

    StoreProductoRequest:
      type: object
      required:
        - cod_producto
        - nombre
        - categoria_id
        - unidad_medida
        - precio_compra
        - precio_minorista
        - precio_mayorista
        - stock_minimo
      properties:
        cod_producto:
          type: string
          maxLength: 100
          example: PROD-001
        nombre:
          type: string
          maxLength: 255
          example: Leche entera
        categoria_id:
          type: integer
          example: 1
        marca:
          type: string
          nullable: true
          maxLength: 150
          example: Gloria
        unidad_medida:
          type: string
          maxLength: 50
          example: lt
        contenido:
          type: string
          nullable: true
          maxLength: 100
          example: 1lt
        precio_compra:
          type: number
          format: float
          minimum: 0
          example: 2.50
        precio_minorista:
          type: number
          format: float
          minimum: 0
          example: 3.50
        precio_mayorista:
          type: number
          format: float
          minimum: 0
          example: 3.00
        stock_minimo:
          type: integer
          minimum: 0
          example: 10
        activo:
          type: boolean
          default: true
          example: true

    # ── Almacén ───────────────────────────────────────────────

    Almacen:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nombre:
          type: string
          example: Licorería Central
        descripcion:
          type: string
          nullable: true
          example: Sede principal
        direccion:
          type: string
          example: Av. Grau 123
        responsable:
          type: string
          example: Juan Pérez
        telefono:
          type: string
          nullable: true
          example: '999111222'
        activo:
          type: boolean
          example: true
        eliminado_en:
          type: string
          format: date-time
          nullable: true
          example: null
        creado_en:
          type: string
          format: date-time
          example: '2026-03-07 10:00:00'
        actualizado_en:
          type: string
          format: date-time
          example: '2026-03-07 10:00:00'

    StoreAlmacenRequest:
      type: object
      required: [nombre, direccion, responsable]
      properties:
        nombre:
          type: string
          maxLength: 255
          example: Licorería Central
        descripcion:
          type: string
          nullable: true
          maxLength: 500
          example: Sede principal
        direccion:
          type: string
          maxLength: 255
          example: Av. Grau 123
        responsable:
          type: string
          maxLength: 150
          example: Juan Pérez
        telefono:
          type: string
          nullable: true
          maxLength: 20
          example: '999111222'
        activo:
          type: boolean
          default: true
          example: true

    # ── Inventario ────────────────────────────────────────────

    Inventario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        cantidad:
          type: integer
          example: 50
        cantidad_reservada:
          type: integer
          example: 5
        cantidad_disponible:
          type: integer
          description: cantidad - cantidad_reservada (calculado en el Resource)
          example: 45
        cantidad_minima:
          type: integer
          example: 10
        bajo_minimo:
          type: boolean
          description: true si cantidad < cantidad_minima
          example: false
        ultima_actualizacion:
          type: string
          format: date-time
          example: '2026-03-07 10:00:00'
        producto:
          $ref: '#/components/schemas/Producto'
        almacen:
          $ref: '#/components/schemas/Almacen'
        creado_en:
          type: string
          format: date-time
          example: '2026-03-07 10:00:00'
        actualizado_en:
          type: string
          format: date-time
          example: '2026-03-07 10:00:00'

    StoreInventarioRequest:
      type: object
      required: [producto_id, almacen_id, cantidad]
      properties:
        producto_id:
          type: integer
          example: 1
        almacen_id:
          type: integer
          example: 1
        cantidad:
          type: integer
          minimum: 0
          example: 50
        cantidad_reservada:
          type: integer
          minimum: 0
