  # ── Inventario ────────────────────────────────────────────────

  /inventario:
    get:
      tags: [Inventario]
      summary: Listar registros de inventario
      parameters:
        - name: producto_id
          in: query
          description: Filtrar por producto
          schema:
            type: integer
            example: 1
        - name: almacen_id
          in: query
          description: Filtrar por almacén
          schema:
            type: integer
            example: 1
        - name: bajo_minimo
          in: query
          description: Solo registros con stock por debajo del mínimo
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: Inventario obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Inventario'

    post:
      tags: [Inventario]
      summary: Crear registro de inventario
      description: Asigna un producto a un almacén con su stock inicial. La combinación producto_id + almacen_id debe ser única.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreInventarioRequest'
      responses:
        '201':
          description: Registro de inventario creado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Inventario'
        '422':
          $ref: '#/components/responses/ValidationError'

  /inventario/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'

    get:
      tags: [Inventario]
      summary: Obtener registro de inventario por ID
      responses:
        '200':
          description: Registro obtenido correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Inventario'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Inventario]
      summary: Actualizar inventario (completo)
      description: Actualización manual de cantidades. ultima_actualizacion se recalcula automáticamente al cambiar cantidad o cantidad_reservada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInventarioRequest'
      responses:
        '200':
          description: Inventario actualizado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Inventario'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    patch:
      tags: [Inventario]
      summary: Actualizar inventario (parcial)
      description: Actualiza solo los campos enviados. ultima_actualizacion se recalcula automáticamente al cambiar cantidad o cantidad_reservada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInventarioRequest'
      responses:
        '200':
          description: Inventario actualizado correctamente
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
