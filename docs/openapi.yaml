openapi: 3.0.3

info:
  title: API Inventario — Licorería
  description: |
    API REST para gestión de inventario, ventas y movimientos de una licorería.

    ## Autenticación
    La API usa **JWT (Bearer Token)**. Para acceder a los endpoints protegidos:
    1. Llama a `POST /auth/login` con email y password
    2. Copia el `access_token` de la respuesta
    3. Haz clic en **Authorize** (candado) e ingresa: `Bearer {access_token}`

    El token expira en **60 minutos**. Para renovarlo usa `POST /auth/refresh`
    (el refresh token viaja automáticamente en una cookie httpOnly).

    ## Roles
    | Rol | Acceso |
    |-----|--------|
    | **Administrador** | Todos los endpoints |
    | **Vendedor** | Lectura de catálogo + crear/completar ventas con detalles |

    ## Credenciales de prueba
    | Usuario | Email | Password | Rol |
    |---------|-------|----------|-----|
    | miller | miller@licoreria.com | admin123 | Administrador |
    | carlos | carlos@licoreria.com | vendedor123 | Vendedor |
  version: 1.0.0

servers:
  - url: https://learn-laravel-nine.vercel.app/v1
    description: Producción (Vercel)
  - url: http://localhost:8000/v1
    description: Desarrollo local

# Seguridad global — todos los endpoints requieren Bearer token
# Los endpoints públicos (login, refresh) lo sobreescriben con security: []
security:
  - BearerAuth: []

tags:
  - name: Auth
    description: "Autenticación JWT — login, logout, refresh y perfil"
  - name: Categorías
    description: Gestión de categorías de productos
  - name: Productos
    description: Gestión de productos del inventario
  - name: Almacenes
    description: Gestión de almacenes y sedes
  - name: Inventario
    description: Stock de productos por almacén
  - name: Roles
    description: "Solo Administrador — gestión de roles del sistema"
  - name: Usuarios
    description: "Solo Administrador — gestión de usuarios del sistema"
  - name: Ventas
    description: Gestión de ventas
  - name: Movimientos
    description: Registro de entradas y salidas de inventario (auditoría)
  - name: Detalle Ventas
    description: Líneas de detalle de una venta (sub-recurso de Ventas, registro inmutable)

# ══ PATHS ═══════════════════════════════════════════════════════

paths:

  # ── Auth ──────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: |
        Autentica al usuario y retorna un **access token JWT** (60 min).
        El **refresh token** (30 días) se envía automáticamente en una cookie httpOnly.

        **Validaciones:**
        - Credenciales incorrectas → 401
        - Usuario con `activo = false` → 401
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Sesión iniciada correctamente
          headers:
            Set-Cookie:
              description: "refresh_token=...; HttpOnly; SameSite=Strict; Path=/api/v1/auth"
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResponse'
              example:
                success: true
                message: Sesión iniciada correctamente.
                data:
                  access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
                  token_type: bearer
                  expires_in: 3600
                  usuario:
                    id: 3
                    username: carlos
                    email: carlos@licoreria.com
                    rol:
                      nombre: Vendedor
        '401':
          description: Credenciales incorrectas o usuario desactivado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                credenciales_incorrectas:
                  summary: Credenciales incorrectas
                  value:
                    success: false
                    message: Credenciales incorrectas.
                usuario_inactivo:
                  summary: Usuario desactivado
                  value:
                    success: false
                    message: Tu cuenta está desactivada. Contacta al administrador.
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: |
        Renueva el **access token** usando el **refresh token** de la cookie httpOnly.
        El navegador/cliente envía la cookie automáticamente.

        - Rota el refresh token (el anterior queda inválido)
        - Si el refresh token expiró → 401 (debe hacer login nuevamente)
      security: []
      responses:
        '200':
          description: Token renovado correctamente
          headers:
            Set-Cookie:
              description: Nuevo refresh_token rotado
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                success: false
                message: Refresh token expirado. Por favor inicia sesión nuevamente.

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      description: |
        Invalida el **access token** (blacklist JWT) y elimina el **refresh token** de la BD.
        Limpia la cookie del navegador.

        Requiere `Authorization: Bearer {token}`.
      responses:
        '200':
          description: Sesión cerrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: Sesión cerrada correctamente.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil del usuario autenticado
      description: Retorna los datos del usuario propietario del token activo.
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Categorías ────────────────────────────────────────────────

  /categorias:
